name: photographes_mobile
description: Application mobile Photographes.ci — Marketplace photographes/clients en Côte d'Ivoire.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  supabase_flutter: ^2.5.0
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.0
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  pin_code_fields: ^9.1.0
  table_calendar: ^3.1.2
  photo_view: ^0.15.0
  flutter_reorderable_grid_view: ^3.1.0
  timeago: ^3.7.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
