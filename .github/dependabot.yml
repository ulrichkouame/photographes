version: 2
updates:
  # Web application (npm)
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Africa/Abidjan
    open-pull-requests-limit: 10
    groups:
      next-js:
        patterns: ["next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      testing:
        patterns: ["*jest*", "*playwright*", "*testing-library*", "vitest"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*", "prettier*"]
    labels:
      - dependencies
      - javascript

  # Mobile application (pub / Flutter)
  - package-ecosystem: pub
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Africa/Abidjan
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - flutter

  # Supabase Edge Functions (Deno — no native ecosystem support, use npm for lockfile)
  - package-ecosystem: npm
    directory: /supabase/functions
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - supabase

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
